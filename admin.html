<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clam Glid Gym — Admin</title><link rel="stylesheet" href="assets/style.css"></head><body>
  <div class="container"><div class="header"><div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><defs><linearGradient id="g1" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#02aab0"/><stop offset="1" stop-color="#00cdac"/></linearGradient></defs><rect width="120" height="120" rx="18" fill="url(#g1)"/><g transform="translate(10,20)" fill="#fff"><rect x="6" y="36" width="10" height="6" rx="2"></rect><rect x="26" y="16" width="10" height="26" rx="2"></rect><rect x="46" y="6" width="10" height="36" rx="2"></rect><rect x="66" y="0" width="10" height="42" rx="2"></rect><rect x="86" y="6" width="10" height="36" rx="2"></rect><rect x="6" y="36" width="90" height="6" rx="3"></rect><text x="10" y="95" font-family="Poppins, sans-serif" font-weight="700" font-size="12">CLAM GLID</text></g></svg></div><div><h1>Clam Glid Gym</h1><p>Admin Panel — Members</p></div></div>
    <div class="card"><div class="topbar"><div><strong>Admin Access</strong><div class="small-muted">Enter admin password to view member data</div></div><div><input id="adminPass" class="input" placeholder="Admin password"><button class="btn" onclick="unlock()">Unlock</button></div></div>
      <div id="adminArea" class="hidden"><div class="admin-note">Only admins with password can see this list.</div><table class="table" id="membersTable"><thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Email</th><th>Membership</th><th>Address</th><th>Date</th></tr></thead><tbody></tbody></table><div style="margin-top:12px" class="center"><button class="btn" onclick="downloadCSV()">Download CSV</button><button class="btn ghost" onclick="clearAll()">Clear All</button></div></div></div><div class="footer">© 2025 Clam Glid Gym</div><script src="assets/app.js"></script><script>function unlock(){const pass=document.getElementById('adminPass').value;if(checkAdminPass(pass)){document.getElementById('adminArea').classList.remove('hidden');renderAdmin();}else{alert('Wrong password');}}function renderAdmin(){const tbody=document.querySelector('#membersTable tbody');const rows=loadMembers();tbody.innerHTML='';if(!rows.length){tbody.innerHTML='<tr><td colspan="8">No members registered</td></tr>';return;}rows.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${esc(r.name)}</td><td>${esc(r.age)}</td><td>${esc(r.gender)}</td><td>${esc(r.phone)}</td><td>${esc(r.email)}</td><td>${esc(r.membership)}</td><td>${esc(r.address)}</td><td>${new Date(r.date).toLocaleString()}</td>`;tbody.appendChild(tr);});}function clearAll(){if(confirm('Clear all saved responses? This CANNOT be undone.')){clearMembers();renderAdmin();}};</script></body></html>
