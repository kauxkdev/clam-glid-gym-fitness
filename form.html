<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clam Glid Gym — Register</title><link rel="stylesheet" href="assets/style.css"></head><body>
  <div class="container"><div class="header"><div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><defs><linearGradient id="g1" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#02aab0"/><stop offset="1" stop-color="#00cdac"/></linearGradient></defs><rect width="120" height="120" rx="18" fill="url(#g1)"/><g transform="translate(10,20)" fill="#fff"><rect x="6" y="36" width="10" height="6" rx="2"></rect><rect x="26" y="16" width="10" height="26" rx="2"></rect><rect x="46" y="6" width="10" height="36" rx="2"></rect><rect x="66" y="0" width="10" height="42" rx="2"></rect><rect x="86" y="6" width="10" height="36" rx="2"></rect><rect x="6" y="36" width="90" height="6" rx="3"></rect><text x="10" y="95" font-family="Poppins, sans-serif" font-weight="700" font-size="12">CLAM GLID</text></g></svg></div><div><h1>Clam Glid Gym</h1><p>Step 2 — Registration Form</p></div></div>
    <div class="bg-image-full" style="background-image:url('https://images.unsplash.com/photo-1546488630-86d2c93b59c9?q=80&w=1600&auto=format&fit=crop')"></div>
    <div class="content-overlay card"><div class="topbar"><div class="small-muted">Please fill required fields. We will contact you soon via email.</div><div><button class="btn" onclick="goTo('index.html')">Back</button></div></div>
      <form id="regForm"><div class="form-grid"><div><label>Full name</label><input id="name" class="input" required><label>Age</label><input id="age" class="input" type="number" required><label>Gender</label><select id="gender" class="input"><option>Male</option><option>Female</option><option>Other</option></select><label>Phone</label><input id="phone" class="input" required><label>Email</label><input id="email" class="input" type="email" placeholder="we will contact you"></div><div><label>Address</label><textarea id="address" class="input"></textarea><label>Membership</label><select id="membership" class="input"><option value="monthly">Monthly - ₹800</option><option value="yearly">Yearly - ₹9500</option><option value="3month">3-Months (30% off)</option></select><label>Payment Method</label><select id="payment" class="input"><option>PhonePe / GooglePay / UPI / Card</option></select><label>Additional Notes</label><textarea id="notes" class="input"></textarea></div></div>
        <div style="margin-top:12px;display:flex;gap:10px;align-items:center"><button class="btn" type="button" onclick="submitForm()">Submit & Continue</button><button class="btn ghost" type="button" onclick="goTo('index.html')">Cancel</button><div style="flex:1"></div><div class="small-muted">Admin-only access to member list</div></div></form></div><div class="footer">© 2025 Clam Glid Gym</div>
<script src="assets/app.js"></script>
<script>function submitForm(){const t=JSON.parse(localStorage.getItem('clam_glid_temp_v1')||'{}');const name=document.getElementById('name').value.trim()||t.name||'';const age=document.getElementById('age').value.trim();const gender=document.getElementById('gender').value;const phone=document.getElementById('phone').value.trim()||t.phone||'';const email=document.getElementById('email').value.trim();const address=document.getElementById('address').value.trim();const membership=document.getElementById('membership').value;const payment=document.getElementById('payment').value;const notes=document.getElementById('notes').value.trim();if(!name||!phone||!age){alert('Please complete name, age and phone');return;}const member={ name, age, gender, phone, email, address, membership, payment, notes, date: new Date().toISOString() };saveMember(member);localStorage.removeItem('clam_glid_temp_v1');localStorage.setItem('clam_glid_last_v1',JSON.stringify(member));alert('✅ Registered — we will contact you soon!');window.location.href='info.html';}</script></body></html>
